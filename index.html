<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レトロ競馬シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            user-select: none;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 疾走感を出す背景スクロールアニメーション */
        @keyframes scrollBg {
            0% { background-position: 0 0; }
            100% { background-position: -100px 0; }
        }
        .bg-scroll {
            background-image: repeating-linear-gradient(90deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 50px, transparent 50px, transparent 100px);
            animation: scrollBg 0.4s linear infinite;
        }
        
        /* 砂埃のアニメーション */
        @keyframes dustFly {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0.8; }
            100% { transform: translate(-20px, -5px) scale(1.5); opacity: 0; }
        }
        .dust-anim {
            animation: dustFly 0.3s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-950 text-amber-500 p-2 md:p-4">
    <div id="app" class="max-w-6xl mx-auto border-4 border-amber-600 rounded-sm p-1 bg-black shadow-[0_0_15px_rgba(217,119,6,0.5)]">
        
        <!-- ヘッダー情報 -->
        <div id="main-header" class="border-b-2 border-amber-800 pb-2 mb-2 flex justify-between items-center px-4 pt-2 bg-gradient-to-b from-gray-900 to-black relative">
            <div class="absolute top-1 right-2 text-[10px] text-gray-500 flex items-center gap-1 md:gap-2">
                <span id="login-status" class="mr-2 hidden md:inline"></span>
                <button onclick="goToTitle()" class="bg-gray-800 hover:bg-gray-700 text-amber-500 px-1.5 md:px-2 py-0.5 rounded border border-gray-600 transition-colors">🏠 タイトル</button>
                <button onclick="showHelpModal()" class="bg-gray-800 hover:bg-gray-700 text-amber-500 px-1.5 md:px-2 py-0.5 rounded border border-gray-600 transition-colors">📖 遊び方</button>
                <button id="btn-save" onclick="showSaveModal()" class="bg-gray-800 hover:bg-gray-700 text-amber-500 px-1.5 md:px-2 py-0.5 rounded border border-gray-600 transition-colors">💾 セーブ</button>
                <button id="btn-load" onclick="showLoadModal()" class="bg-gray-800 hover:bg-gray-700 text-amber-500 px-1.5 md:px-2 py-0.5 rounded border border-gray-600 transition-colors">📂 ロード</button>
                <div id="header-mode-indicator" class="hidden md:flex items-center ml-1">
                    <span class="w-2 h-2 rounded-full bg-blue-500 mr-1 inline-block"></span>LOCAL PLAY
                </div>
            </div>

            <div>
                <h1 class="text-xl md:text-2xl font-bold text-yellow-400 tracking-widest drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]">
                    🐎 RETRO STAR HORSE
                </h1>
                <p id="header-race-count" class="text-xs text-amber-600 font-bold mt-1">RACE 1</p>
            </div>
            <div class="text-right mt-2">
                <p class="text-[10px] text-amber-600">CREDIT</p>
                <p class="text-2xl text-yellow-400 font-bold drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]">
                    <span id="header-money">10,000</span> <span class="text-sm">円</span>
                </p>
            </div>
        </div>

        <!-- 実況メッセージボード -->
        <div id="message-board" class="bg-gray-900 border-2 border-amber-600 p-2 mb-4 rounded-sm text-yellow-300 text-center font-bold tracking-wide shadow-[inset_0_0_10px_rgba(0,0,0,0.8)]">
            本日はご来場ありがとうございます。BET受付を開始します。
        </div>

        <!-- メインコンテンツ領域 -->
        <div id="main-content"></div>

    </div>

    <!-- モーダル（ポップアップ）用オーバーレイ -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-gray-900 border-2 border-amber-600 p-6 rounded shadow-[0_0_20px_rgba(217,119,6,0.5)] max-w-lg w-full font-mono">
            <!-- JSで動的に書き換え -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === Firebase Init ===
        const firebaseConfig = {
            apiKey: "AIzaSyAgEIFdC_C1aqk-4_x3OjSDd94-7FEKBHE",
            authDomain: "keiba-7fcf0.firebaseapp.com",
            projectId: "keiba-7fcf0",
            storageBucket: "keiba-7fcf0.firebasestorage.app",
            messagingSenderId: "114388442030",
            appId: "1:114388442030:web:9baebd247da42db573c63f",
            measurementId: "G-HZN3MBYB12"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "retro-derby-my-app";
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentRoomId = null;
        let isHost = false;
        let unsubscribeRoom = null;
        let roomData = null;
        let tempPlayerName = "";

        // 同一ブラウザの複数タブでも別人と認識させるためのセッションID
        const localSessionId = typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            window.updateHeader();
            if (state.phase === 'title') {
                window.render();
            }
        });

        const initAuth = async () => {
            if (!auth.currentUser) {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        window.loginWithGoogleTitle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                if (result.user) {
                    await window.executeCloudLoad();
                }
            } catch (e) {
                console.error("Login failed", e);
                alert("ログインに失敗しました。\n\n【重要】HTMLファイルを直接開いている場合、Googleログインは動作しません。Vercel等で公開したURL（https://...）からアクセスしてください。\n\nエラー: " + e.message);
            }
        };

        window.loginWithGoogle = () => {
            signInWithPopup(auth, provider).catch(e => {
                console.error("Login failed", e);
                alert("ログインに失敗しました。\n※HTMLファイルを直接開いている場合、Googleログインは動作しません。Vercel等で公開したURLからアクセスしてください。");
            });
        };
        
        window.logoutGoogle = async () => {
            try {
                await signOut(auth);
                state.loginSelected = false; 
                window.executeGoToTitle();
            } catch(e) {
                console.error("Logout failed", e);
            }
        };

        // --- 定数データ ---
        const HORSE_NAMES = ["ハルウララ", "ディープ", "オグリ", "マックイーン", "テイオー", "ルドルフ", "ゴルシ", "ブルボン", "ライス", "タマモ", "スズカ", "ウオッカ", "ダスカ"];
        const CONDITIONS = [
            { label: "絶好調", mod: 1.1, icon: "🔥", color: "text-red-500" },
            { label: "好調", mod: 1.05, icon: "✨", color: "text-orange-400" },
            { label: "普通", mod: 1.0, icon: "・", color: "text-white" },
            { label: "不調", mod: 0.9, icon: "💧", color: "text-blue-400" },
        ];
        const TYPES = ["逃げ", "先行", "差し", "追込"];
        const BET_TYPES = ["単勝", "複勝", "枠連", "馬連", "馬単", "ワイド", "3連複", "3連単"];
        const WAKU_COLORS = [
            { bg: 'bg-white', text: 'text-black', border: 'border-gray-400' },
            { bg: 'bg-gray-800', text: 'text-white', border: 'border-gray-900' },
            { bg: 'bg-red-600', text: 'text-white', border: 'border-red-800' },
            { bg: 'bg-blue-600', text: 'text-white', border: 'border-blue-800' },
            { bg: 'bg-yellow-400', text: 'text-black', border: 'border-yellow-600' },
            { bg: 'bg-green-600', text: 'text-white', border: 'border-green-800' },
            { bg: 'bg-orange-500', text: 'text-white', border: 'border-orange-700' },
            { bg: 'bg-pink-400', text: 'text-black', border: 'border-pink-600' }
        ];

        // --- アップグレードデータ ---
        const MULTI_BONUS_UPGRADES = [
            { level: 1, rate: 1.0, cost: 0 },
            { level: 2, rate: 1.1, cost: 100000 },
            { level: 3, rate: 1.2, cost: 500000 },
            { level: 4, rate: 1.3, cost: 1000000 },
            { level: 5, rate: 1.5, cost: 5000000 },
            { level: 6, rate: 2.0, cost: 10000000 }
        ];

        // --- ユーティリティ ---
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        
        const getInitialHorse = () => {
            const prefix = ["スーパー", "ミラクル", "シャイニング", "ダーク", "クレイジー", "ワンダー"];
            const nameBase = HORSE_NAMES[randomInt(0, HORSE_NAMES.length - 1)];
            const name = Math.random() > 0.5 ? `${prefix[randomInt(0, prefix.length - 1)]}${nameBase}` : `${nameBase}ボーイ`;
            return {
                id: Date.now() + randomInt(0, 1000),
                name: name,
                type: TYPES[randomInt(0, TYPES.length - 1)],
                speed: 75,   
                stamina: 70, 
                guts: 65,    
                lastRaceResult: '新馬',
                lifespan: randomInt(12, 18) // ★初期馬の寿命（12〜18戦）
            };
        };

        const generateHorses = (isSinglePlayer = true, customHorsesPool = []) => {
            let horses = [];
            let totalPower = 0;
            const prefix = ["スーパー", "ミラクル", "シャイニング", "ダーク", "クレイジー", "ワンダー"];
            const JOCKEYS = [
                { name: "武", rank: "S", skill: 1.05 },
                { name: "ルメ", rank: "S", skill: 1.05 },
                { name: "川田", rank: "S", skill: 1.05 },
                { name: "横山", rank: "A", skill: 1.02 },
                { name: "戸崎", rank: "A", skill: 1.02 },
                { name: "松山", rank: "A", skill: 1.02 },
                { name: "デム", rank: "B", skill: 0.98 },
                { name: "岩田", rank: "B", skill: 0.98 },
                { name: "池添", rank: "B", skill: 0.98 },
                { name: "坂井", rank: "C", skill: 0.95 },
                { name: "新人", rank: "C", skill: 0.90 }
            ];

            let participatingMyHorses = [];
            let poolToUse = isSinglePlayer ? (state.myHorses || []) : customHorsesPool;

            if (poolToUse && poolToUse.length > 0) {
                const shuffledMyHorses = [...poolToUse].sort(() => Math.random() - 0.5);
                let count = 0;
                shuffledMyHorses.forEach(myHorse => {
                    // 確率UP: 90%の確率で出現 (最大3頭まで)
                    if (Math.random() < 0.90 && participatingMyHorses.length < 8 && count < 3) {
                        participatingMyHorses.push(myHorse);
                        count++;
                    }
                });
            }

            const numToGenerate = 8 - participatingMyHorses.length;

            for (let i = 1; i <= numToGenerate; i++) {
                const baseSpeed = randomInt(70, 95);
                const stamina = randomInt(60, 95);
                const guts = randomInt(50, 90);
                const condition = CONDITIONS[randomInt(0, CONDITIONS.length - 1)];
                const type = TYPES[randomInt(0, TYPES.length - 1)];
                const jockey = JOCKEYS[randomInt(0, JOCKEYS.length - 1)];
                
                const power = (baseSpeed + stamina + guts) * condition.mod * jockey.skill;

                const nameBase = HORSE_NAMES[randomInt(0, HORSE_NAMES.length - 1)];
                const name = Math.random() > 0.5 ? `${prefix[randomInt(0, prefix.length - 1)]}${nameBase}` : `${nameBase}ボーイ`;

                const weight = randomInt(430, 540);
                const weightDiff = randomInt(-10, 10);
                const weightStr = `${weight}(${weightDiff > 0 ? '+'+weightDiff : weightDiff === 0 ? '±0' : weightDiff})`;
                
                let lastRace = randomInt(1, 9);
                if (power > 290) lastRace = randomInt(1, 2);
                else if (power > 250) lastRace = randomInt(1, 4);
                else if (power < 200) lastRace = randomInt(5, 9);

                horses.push({
                    id: i, no: i, name: name,
                    speed: baseSpeed, stamina: stamina, guts: guts,
                    type: type, condition: condition, power: power,
                    isDelayed: Math.random() < 0.15,
                    randomFactor: Math.random(),
                    jockey: jockey,
                    weightStr: weightStr,
                    lastRace: `${lastRace}着`,
                    isAccident: Math.random() < 0.001,
                    accidentTick: randomInt(150, 450),
                    isRetired: false,
                    isMyHorse: false
                });
            }

            participatingMyHorses.forEach((myHorse, idx) => {
                const condition = CONDITIONS[randomInt(0, CONDITIONS.length - 1)];
                const jockey = JOCKEYS[randomInt(0, JOCKEYS.length - 1)];
                const power = (myHorse.speed + myHorse.stamina + myHorse.guts) * condition.mod * jockey.skill;
                const weight = randomInt(450, 520);
                const weightDiff = randomInt(-10, 10);
                const weightStr = `${weight}(${weightDiff > 0 ? '+'+weightDiff : weightDiff === 0 ? '±0' : weightDiff})`;
                
                horses.push({
                    id: 100 + idx, no: 0, name: myHorse.name,
                    speed: myHorse.speed, stamina: myHorse.stamina, guts: myHorse.guts,
                    type: myHorse.type, condition: condition, power: power,
                    isDelayed: Math.random() < 0.10, 
                    randomFactor: Math.random(),
                    jockey: jockey,
                    weightStr: weightStr,
                    lastRace: myHorse.lastRaceResult,
                    isAccident: false, 
                    accidentTick: 0,
                    isRetired: false,
                    isMyHorse: true,
                    originalRef: myHorse,
                    ownerSessionId: isSinglePlayer ? localSessionId : myHorse.ownerSessionId,
                    ownerName: isSinglePlayer ? 'あなた' : myHorse.ownerName
                });
            });

            horses.forEach(h => totalPower += h.power);

            horses = horses.map(h => {
                const winOdds = Math.max(1.1, ((totalPower / h.power) * 0.8) + (Math.random() * 2 - 1));
                return { ...h, odds: parseFloat(winOdds.toFixed(1)) };
            }).sort((a, b) => a.odds - b.odds);

            const marks = ["◎", "〇", "▲", "△", "△", "・", "・", "・"];
            horses.forEach((h, index) => { h.mark = marks[index]; });

            horses.sort(() => Math.random() - 0.5);
            horses.forEach((h, index) => {
                h.no = index + 1;
            });

            return horses.sort((a, b) => a.no - b.no).map((h, i) => ({ ...h, waku: WAKU_COLORS[i] }));
        };

        // --- グローバル状態 ---
        const state = {
            mode: 'single', 
            hardcoreId: null, 
            phase: 'title',
            horses: [],
            raceCount: 1,
            money: 10000,
            multiBonusLevel: 1, 
            bets: [],
            message: "本日はご来場ありがとうございます。BET受付を開始します。",
            selectedBetType: '単勝',
            selectedHorses: [],
            betAmount: 100, 
            animationRef: null,
            horsesRef: [],
            raceResult: [],
            lastProg: 0, 
            myHorseTempType: '逃げ',
            myHorses: [],
            trainingHorse: null,
            training: { turn: 10, hp: 100, maxHp: 100 },
            isDead: false 
        };

        // --- 所持金の同期機能 ---
        window.syncMoney = (newMoney) => {
            state.money = newMoney;
            window.updateHeader();
            if (state.mode === 'multi' && currentRoomId) {
                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', currentRoomId), {
                    [`players.${localSessionId}.money`]: newMoney
                }).catch(e => console.error("Money sync error:", e));
            }
        };

        // --- BET金額の更新 ---
        window.updateBetAmount = (val) => {
            if (val === "") {
                state.betAmount = "";
                return;
            }
            const amt = parseInt(val, 10);
            if(!isNaN(amt)) {
                state.betAmount = amt;
            }
        };

        // --- UI更新関数 ---
        window.updateHeader = function() {
            document.getElementById('header-race-count').innerText = `RACE ${state.raceCount}`;
            document.getElementById('header-money').innerText = state.money.toLocaleString();

            const indicator = document.getElementById('header-mode-indicator');
            const btnSave = document.getElementById('btn-save');
            const btnLoad = document.getElementById('btn-load');
            const loginStatus = document.getElementById('login-status');

            if (loginStatus) {
                if (currentUser && !currentUser.isAnonymous) {
                    loginStatus.innerHTML = `<span class="text-green-400">👤 ${currentUser.displayName || 'Player'}</span> <button onclick="logoutGoogle()" class="underline ml-1 text-gray-400 hover:text-white">ログアウト</button>`;
                } else {
                    loginStatus.innerHTML = `<button onclick="loginWithGoogle()" class="text-blue-400 hover:text-blue-300 underline">Googleログイン</button>`;
                }
            }

            if (state.mode === 'multi') {
                indicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 mr-1 inline-block animate-pulse"></span>ONLINE: ${currentRoomId || ''}`;
                btnSave.style.display = 'none';
                btnLoad.style.display = 'none';
            } else if (state.mode === 'hardcore') {
                indicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-600 mr-1 inline-block animate-pulse"></span>HARDCORE`;
                btnSave.style.display = 'block'; 
                btnLoad.style.display = 'block'; 
            } else {
                indicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-blue-500 mr-1 inline-block"></span>LOCAL PLAY`;
                btnSave.style.display = 'block';
                btnLoad.style.display = 'block';
            }
        };

        window.setMessage = function(msg) {
            state.message = msg;
            const mb = document.getElementById('message-board');
            if(mb) mb.innerText = msg;
        };

        // --- セーブ＆ロード ---
        window.generateSaveData = function() {
            const saveData = {
                md: state.mode,
                hid: state.hardcoreId, 
                m: state.money,
                r: state.raceCount,
                b: state.multiBonusLevel || 1, 
                h: state.myHorses.map(h => ({
                    n: h.name, t: h.type, s: h.speed, st: h.stamina, g: h.guts, l: h.lastRaceResult, ls: h.lifespan // ★寿命を保存
                }))
            };
            const jsonStr = JSON.stringify(saveData);
            return btoa(unescape(encodeURIComponent(jsonStr)));
        };

        window.loadSaveData = function(base64) {
            try {
                const jsonStr = decodeURIComponent(escape(atob(base64)));
                const data = JSON.parse(jsonStr);
                if (data.m === undefined || data.r === undefined || !Array.isArray(data.h)) return false;
                
                if (data.md === 'hardcore' && data.hid) {
                    const deadIdsStr = localStorage.getItem('dead_hardcore_ids') || '[]';
                    const deadIds = JSON.parse(deadIdsStr);
                    if (deadIds.includes(data.hid)) {
                        return 'dead'; 
                    }
                }

                state.mode = data.md || 'single';
                state.hardcoreId = data.hid || null;
                state.money = data.m;
                state.raceCount = data.r;
                state.multiBonusLevel = data.b || 1; 
                state.myHorses = data.h.map((h, i) => ({
                    name: h.n, type: h.t, speed: h.s, stamina: h.st, guts: h.g, lastRaceResult: h.l,
                    lifespan: h.ls !== undefined ? h.ls : 15, // ★寿命を復元（過去セーブ用フォールバック付）
                    id: 1000 + i
                }));
                return true;
            } catch(e) {
                return false;
            }
        };

        window.openModal = function(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-overlay').classList.remove('hidden');
        };

        window.closeModal = function() {
            document.getElementById('modal-overlay').classList.add('hidden');
        };

        window.showSettingsModal = () => {
            window.openModal(`
                <h3 class="text-xl text-yellow-400 font-bold mb-6 text-center">⚙️ 設定</h3>
                <div class="flex flex-col gap-4 mb-6 px-4">
                    <a href="mailto:j7fuji.ka@gmail.com?subject=【レトロ競馬】問い合わせ" class="block text-center bg-gradient-to-b from-blue-700 to-blue-900 hover:from-blue-600 hover:to-blue-800 text-white font-bold py-4 rounded border border-blue-500 transition-colors shadow-md">
                        📧 開発者へ問い合わせる
                    </a>
                </div>
                <div class="text-center">
                    <button onclick="closeModal()" class="bg-gray-800 hover:bg-gray-700 text-white px-8 py-2 rounded border border-gray-600 transition-colors">閉じる</button>
                </div>
            `);
        };

        window.showHelpModal = () => {
            window.openModal(`
                <h3 class="text-xl text-yellow-400 font-bold mb-4 text-center">📖 遊び方</h3>
                <div class="text-xs md:text-sm text-gray-300 mb-4 h-64 overflow-y-auto space-y-3 border border-amber-900 p-3 bg-black rounded shadow-inner hide-scrollbar">
                    <p><strong class="text-white">【基本ルール】</strong><br>所持金を使って馬券を買い、レースで資金を増やしましょう。所持金が0になり、売却できる馬もいないとゲームオーバーになります。</p>
                    <p><strong class="text-white">【ハードコアモード】</strong><br>ひとりで遊ぶの高難易度モードです。馬券が的中すれば配当は常に1万倍ですが、一度でもハズレると全財産と愛馬が没収されます。</p>
                    <p><strong class="text-white">【マイホースの育成】</strong><br>資金が貯まると、最大6頭まで自分だけの馬を購入し育成できます。調教メニューを選んでステータスを上げましょう。</p>
                    <p><strong class="text-white">【マイホースの出走と寿命】</strong><br>育成したマイホースは、高確率（90%）で通常のレースに乱入出走します。ただし、レースをこなすたびに寿命が減り、0になると引退してしまいます。</p>
                    <p><strong class="text-white">【みんなで遊ぶ (マルチプレイ)】</strong><br>友達と部屋を作って対戦できます。ホストやゲストが育てた馬もオンラインのレースに参戦します！</p>

                state.myHorses.push(getInitialHorse());
            }
            
            const customPool = state.myHorses.map(h => ({...h, ownerName: nameToUse, ownerSessionId: localSessionId}));
            const newHorses = generateHorses(false, customPool); 
            
            const initialMoneyInfo = window.getMultiplayerInitialMoney();
            const initialMoney = initialMoneyInfo.money;

            const initialRoomData = {
                hostUid: localSessionId, 
                phase: 'lobby',
                raceCount: 1,
                horses: newHorses,
                players: {
                    [localSessionId]: { name: nameToUse, ready: false, money: initialMoney, myHorses: state.myHorses }
                },
                timestamp: Date.now()
            };
            
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', currentRoomId), initialRoomData);
                window.syncMoney(initialMoney);
                window.closeModal();
                listenRoom(currentRoomId);
                state.phase = 'lobby'; 
                window.render();
            } catch (e) {
                console.error(e);
                showMultiError("部屋の作成に失敗しました。");
            }
        };

        window.joinRoom = async () => {
            if(!currentUser) {
                showMultiError("通信の準備中です...少し待ってから再度お試しください。");
                return;
            }
            const nameToUse = tempPlayerName.trim() || "ゲスト";
            const roomId = document.getElementById('room-id-input').value.trim();
            
            if(!roomId || roomId.length !== 4) {
                showMultiError("4桁のルームIDを入力してください。");
                return;
            }
            
            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', roomId);
                const snapshot = await getDoc(roomRef);
                if(!snapshot.exists()) {
                    showMultiError("指定された部屋が見つかりません。");
                    return;
                }
                
                if (state.myHorses.length === 0) {
                    state.myHorses.push(getInitialHorse());
                }

                const initialMoneyInfo = window.getMultiplayerInitialMoney();
                const initialMoney = initialMoneyInfo.money;

                await updateDoc(roomRef, {
                    [`players.${localSessionId}`]: { name: nameToUse, ready: false, money: initialMoney, myHorses: state.myHorses }
                });
                
                currentRoomId = roomId;
                isHost = false;
                state.mode = 'multi';
                
                state.bets = [];
                window.syncMoney(initialMoney);
                
                window.closeModal();
                listenRoom(roomId);
                
                const data = snapshot.data();
                if (data.phase === 'betting') {
                    state.phase = 'betting';
                    state.raceCount = data.raceCount;
                    state.horses = data.horses;
                    window.render();
                } else {
                    state.phase = 'lobby'; 
                    window.setMessage("レースが終了するのを待っています...");
                    window.render();
                }
            } catch(e) {
                console.error(e);
                showMultiError("入室に失敗しました。");
            }
        };

        function listenRoom(roomId) {
            if(unsubscribeRoom) unsubscribeRoom();
            
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', roomId);
            unsubscribeRoom = onSnapshot(roomRef, (snapshot) => {
                if (!snapshot.exists()) {
                    alert("ホストが退出したため、部屋が解散されました。");
                    window.executeGoToTitle(true); 
                    return;
                }
                
                const data = snapshot.data();
                const oldPhase = roomData ? roomData.phase : null;
                roomData = data;
                
                state.raceCount = data.raceCount;
                state.horses = data.horses;
                
                if (data.phase === 'betting' && oldPhase !== 'betting') {
                    state.phase = 'betting';
                    state.bets = [];
                    state.selectedHorses = [];
                    if(state.animationRef) cancelAnimationFrame(state.animationRef);
                    window.setMessage("BET受付を開始します。馬券を購入したら「READY(準備完了)」を押してください。");
                    window.render();
                }
                else if (data.phase === 'running' && oldPhase !== 'running') {
                    state.phase = 'running';
                    window.setMessage("各馬ゲートイン完了... スタートしました！");
                    window.render();
                    setTimeout(() => {
                        window.startRaceAnimation();
                    }, 100);
                }
                
                if (state.phase === 'lobby' || state.phase === 'betting') {
                    window.render();
                }
            }, (error) => {
                console.error(error);
                window.setMessage("通信エラーが発生しました");
            });
        }

        window.startMultiRace = async () => {
            if (!currentRoomId) return;
            const players = { ...roomData.players };
            Object.keys(players).forEach(sid => players[sid].ready = false);
            
            let pool = [];
            Object.keys(players).forEach(sid => {
                const p = players[sid];
                if(p.myHorses && p.myHorses.length > 0) {
                    pool = pool.concat(p.myHorses.map(h => ({...h, ownerName: p.name, ownerSessionId: sid})));
                }
            });

            const newHorses = generateHorses(false, pool);

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', currentRoomId), {
                phase: 'betting',
                players: players,
                horses: newHorses
            });
        };

        window.toggleReady = async () => {
            if (!currentRoomId) return;
            const isReady = roomData.players[localSessionId].ready;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', currentRoomId), {
                [`players.${localSessionId}.ready`]: !isReady
            });
        };

        window.startMultiRun = async () => {
            if(!isHost || !currentRoomId || !roomData) return;
            
            const allReady = Object.values(roomData.players).every(p => p.ready);
            if (!allReady) {
                alert("全員が準備完了するまでスタートできません！");
                return;
            }

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', currentRoomId), {
                phase: 'running'
            });
        };

        window.nextMultiRace = async () => {
            if(!isHost || !currentRoomId || !roomData) return;
            const nextCount = state.raceCount + 1;
            
            const updatedPlayers = { ...roomData.players };
            Object.keys(updatedPlayers).forEach(k => updatedPlayers[k].ready = false);
            
            let pool = [];
            Object.keys(updatedPlayers).forEach(sid => {
                const p = updatedPlayers[sid];
                if(p.myHorses && p.myHorses.length > 0) {
                    pool = pool.concat(p.myHorses.map(h => ({...h, ownerName: p.name, ownerSessionId: sid})));
                }
            });
            const newHorses = generateHorses(false, pool); 
            
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', currentRoomId), {
                phase: 'betting',
                raceCount: nextCount,
                horses: newHorses,
                players: updatedPlayers
            });

        window.render = function() {
            const header = document.getElementById('main-header');
            const messageBoard = document.getElementById('message-board');
            
            if (state.phase === 'title') {
                if (header) header.style.display = 'none';
                if (messageBoard) messageBoard.style.display = 'none';
            } else {
                if (header) header.style.display = 'flex';
                if (messageBoard) messageBoard.style.display = 'block';
                window.updateHeader();
            }

            const mainContent = document.getElementById('main-content');

            if (state.phase === 'title') {
                mainContent.innerHTML = getTitleHTML();
            } else if (state.phase === 'lobby') {
                mainContent.innerHTML = getLobbyHTML();
            } else if (state.phase === 'create') {
                mainContent.innerHTML = getCreateHorseHTML();
            } else if (state.phase === 'training') {
                mainContent.innerHTML = getTrainingHTML();
            } else if (state.phase === 'betting') {
                mainContent.innerHTML = getBettingHTML();
            } else if (state.phase === 'running') {
                if (!document.getElementById('race-container')) {
                    mainContent.innerHTML = getRaceHTML();
                    window.startRaceAnimation(); 
                }
            } else if (state.phase === 'result') {
                mainContent.innerHTML = getResultHTML();
            }
        };

        // --- ゲームアクション ---
        window.nextRace = () => {
            if ((state.mode === 'single' || state.mode === 'hardcore') && state.money <= 0 && state.myHorses.length === 0) {
                window.setMessage("破産しました... GAME OVER。ブラウザをリロードして再挑戦してください。");
                return;
            }
            state.bets = [];
            state.raceCount++;
            state.horses = generateHorses(true);
            state.phase = 'betting';
            
            const myHorsesInRace = state.horses.filter(h => h.isMyHorse && h.ownerSessionId === localSessionId).map(h => h.name);
            if (state.money <= 0 && state.myHorses.length > 0) {
                window.setMessage(`破産寸前です...。しかし愛馬を売却すれば資金を作れるかもしれません。`);
            } else if (myHorsesInRace.length > 0) {
                window.setMessage(`第${state.raceCount}レース、BET受付を開始します。愛馬（${myHorsesInRace.join(', ')}）が出走します！`);
            } else {
                window.setMessage(`第${state.raceCount}レース、BET受付を開始します。`);
            }
            window.render();
        };

        window.buyHorse = () => {
            // ★上限数(6頭)のチェック
            if (state.myHorses.length >= 6) {
                window.setMessage(`厩舎が満員です。最大6頭までしか所有できません。（馬を売却するか、寿命を迎えるまでお待ちください）`);
                return;
            }

            const cost = 50000 * (state.myHorses.length + 1);
            if (state.money < cost) {
                window.setMessage(`馬の購入には ${cost.toLocaleString()} 円必要です。レースで資金を増やしましょう！`);
                return;
            }
            window.syncMoney(state.money - cost);
            state.myHorseTempType = '逃げ';
            state.phase = 'create';
            window.setMessage(`馬を購入しました！あなただけの愛馬を作成してください。`);
            window.render();
        };

        window.setMyHorseType = (type) => {
            state.myHorseTempType = type;
            window.render();
        };

        window.startTraining = () => {
            const nameInput = document.getElementById('myhorse-name-input');
            let name = nameInput.value.trim();
            if(!name) name = `マイホース${state.myHorses.length + 1}世`;
            state.trainingHorse = {
                name: name,
                type: state.myHorseTempType,
                speed: 45, 
                stamina: 45, 
                guts: 45, 
                lastRaceResult: '新馬',
                lifespan: randomInt(15, 22) // ★購入馬の寿命（15〜22戦）
            };
            state.training = { turn: 10, hp: 100, maxHp: 100 };
            state.phase = 'training';
            window.setMessage(`${name} の育成を開始します！残り10週でステータスを上げましょう。`);
            window.render();
        };

        window.doTraining = (menu) => {
            let msg = "";
            let hpCost = 25;
            let failureRate = Math.max(0, (40 - state.training.hp) / 40); 
            
            if (menu === 'rest') {
                state.training.hp = Math.min(state.training.maxHp, state.training.hp + 60);
                msg = `休養をとった。体力が回復した！`;
                state.training.turn--;
            } else {
                if (Math.random() < failureRate) {
                    msg = `【失敗】怪我をしてしまった！ステータスは上がらず、体力が減った...`;
                    state.training.hp -= hpCost;
                } else {
                    state.training.hp -= hpCost;
                    let up = randomInt(5, 11); 
                    if (menu === 'speed') { 
                        state.trainingHorse.speed = Math.min(100, state.trainingHorse.speed + up); 
                        msg = `芝コースで調教！スピードが ${up} 上がった！`; 
                    }
                    if (menu === 'stamina') { 
                        state.trainingHorse.stamina = Math.min(100, state.trainingHorse.stamina + up);
                        msg = `ダートコースで調教！スタミナが ${up} 上がった！`; 
                    }
                    if (menu === 'guts') { 
                        state.trainingHorse.guts = Math.min(100, state.trainingHorse.guts + up);
                        msg = `坂路で調教！根性が ${up} 上がった！`; 
                    }
                }
                state.training.turn--;
            }

            if (state.training.turn <= 0) {
                if (!state.trainingHorse.id) state.trainingHorse.id = Date.now();
                state.myHorses.push(state.trainingHorse);
                const horseName = state.trainingHorse.name;
                state.trainingHorse = null;
                state.phase = 'betting';
                state.horses = generateHorses(true);
                window.setMessage(`育成完了！ ${horseName} が厩舎に入りました。次以降のレースでランダムに出走します！`);
            } else {
                window.setMessage(msg + ` (残り${state.training.turn}週)`);
            }
            window.render();
        };

        window.addBet = () => {
            let requiredSelections = 1;
            if (["馬連", "馬単", "枠連", "ワイド"].includes(state.selectedBetType)) requiredSelections = 2;
            if (["3連複", "3連単"].includes(state.selectedBetType)) requiredSelections = 3;

            if (state.selectedHorses.length !== requiredSelections) { window.setMessage(`馬を${requiredSelections}頭選択してください。`); return; }
            
            const betAmt = parseInt(state.betAmount, 10);
            if (isNaN(betAmt) || betAmt <= 0) { window.setMessage("正しい金額を入力してください！"); return; }
            if (state.money < betAmt) { window.setMessage("CREDITが足りません！"); return; }

            window.syncMoney(state.money - betAmt);
            state.bets.push({ type: state.selectedBetType, horses: [...state.selectedHorses], amount: betAmt });
            state.selectedHorses = [];
            window.setMessage("TICKETを追加しました。");
            window.render();
        };

        window.removeBet = (index) => {
            const bet = state.bets[index];
            window.syncMoney(state.money + bet.amount);
            state.bets.splice(index, 1);
            window.render();
        };

        window.showSellModal = (id) => {
            const horse = state.myHorses.find(h => h.id === id);
            if (!horse) return;
            const price = Math.floor((horse.speed + horse.stamina + horse.guts) * 150);
            window.openModal(`
                <h3 class="text-xl text-yellow-400 font-bold mb-4 text-center">💸 馬の売却</h3>
                <p class="text-sm text-gray-300 mb-4 text-center">「${horse.name}」を <span class="text-yellow-400 font-bold">${price.toLocaleString()} 円</span> で売却します。<br>本当によろしいですか？</p>
                <div class="flex justify-between px-4 mt-6">
                    <button onclick="closeModal()" class="bg-gray-800 hover:bg-gray-700 text-white px-6 py-2 rounded border border-gray-600 transition-colors">やめる</button>
                    <button onclick="executeSell(${id}, ${price})" class="bg-red-600 hover:bg-red-500 text-white font-bold px-6 py-2 rounded border border-red-400 transition-colors">売却する</button>
                </div>
            `);
        };

        window.executeSell = (id, price) => {
            const horse = state.myHorses.find(h => h.id === id);
            if (!horse) {
                window.closeModal();
                return;
            }
            state.myHorses = state.myHorses.filter(h => h.id !== id);
            window.syncMoney(state.money + price);
            
            const raceHorse = state.horses.find(h => h.isMyHorse && h.originalRef && h.originalRef.id === id);
            if (raceHorse) {
                raceHorse.isMyHorse = false;
            }

            window.closeModal();
            window.setMessage(`${horse.name} を ${price.toLocaleString()} 円で売却しました。`);
            window.render();
        };

        window.startRace = () => {
            state.phase = 'running';
            window.setMessage("各馬ゲートイン完了... スタートしました！");
            window.render();
        };

        window.setBetType = (type) => { state.selectedBetType = type; state.selectedHorses = []; window.render(); };
        
        window.handleHorseSelect = (horseNo) => {
            let req = 1;
            if (["馬連", "馬単", "枠連", "ワイド"].includes(state.selectedBetType)) req = 2;
            if (["3連複", "3連単"].includes(state.selectedBetType)) req = 3;

            if (state.selectedHorses.includes(horseNo)) {
                state.selectedHorses = state.selectedHorses.filter(no => no !== horseNo);
            } else {
                if (state.selectedHorses.length < req) state.selectedHorses.push(horseNo);
                else if (req > 1) { state.selectedHorses.shift(); state.selectedHorses.push(horseNo); }
                else state.selectedHorses = [horseNo];
            }
            window.render();
        };

        // --- アニメーション ---
        window.startRaceAnimation = function() {
            state.horsesRef = state.horses.map(h => ({ ...h, x: 0, currentSpeed: 0, currentStamina: h.stamina, hasFinished: false }));
            let tick = 0;
            const raceLength = 1000;
            state.lastProg = 0; 

            const animate = () => {
                tick++;
                let allFinished = true;
                let currentTopX = 0;
                let accidentMsg = null;

                state.horsesRef.forEach((h, index) => {
                    if (h.isRetired) return; 

                    if (h.hasFinished) {
                        h.x += h.currentSpeed * 0.8;
                        h.yOffset = Math.sin(tick * h.currentSpeed * 0.4) * 3; 
                        
                        const horseEl = document.getElementById(`horse-dom-${h.no}`);
                        if (horseEl) {
                            horseEl.style.left = `${(h.x / 1000) * 85}%`;
                            horseEl.style.top = `calc(${index * 12 + 2}% + ${h.yOffset}px)`;
                        }
                        return;
                    }
                    
                    allFinished = false; 

                    if (h.isAccident && tick === h.accidentTick) {
                        h.isRetired = true;
                        h.currentSpeed = 0;
                        h.finishTick = Infinity;
                        accidentMsg = `🎙️ ああっ！！ ${h.no}番 ${h.name} にアクシデント発生！！ 競走を中止しました！！`;
                        
                        const horseEl = document.getElementById(`horse-dom-${h.no}`);
                        if (horseEl) {
                            document.getElementById(`horse-emoji-${h.no}`).innerHTML = `<span class="absolute top-0 right-0 text-xs transform scale-x-100"></span>💥`;
                            document.getElementById(`horse-dust-${h.no}`).style.display = 'none';
                        }
                        return; 
                    }

                    const progressRatio = h.x / raceLength;
                    let targetSpeed = h.speed / 40; 

                    if (tick < 60) {
                        if (h.isDelayed) targetSpeed *= 0.5;
                        else if (h.type === '逃げ') targetSpeed *= 1.4;
                    } else if (progressRatio < 0.6) {
                        if (h.type === '逃げ') targetSpeed *= 1.1;
                        if (h.type === '先行') targetSpeed *= 1.0;
                        if (h.type === '差し') targetSpeed *= 0.9;
                        if (h.type === '追込') targetSpeed *= 0.85;
                    } else {
                        if (h.currentStamina > 0) {
                            h.currentStamina -= (0.4 - h.guts / 400); 
                            if (h.type === '追込') targetSpeed *= 1.7;
                            if (h.type === '差し') targetSpeed *= 1.4;
                            if (h.type === '先行') targetSpeed *= 1.1;
                            if (h.type === '逃げ') targetSpeed *= 0.9;
                        } else {
                            targetSpeed *= 0.7;
                        }
                    }

                    const pseudoRandom = Math.sin(tick * 0.1 + h.id) * 0.05;
                    targetSpeed *= (h.condition.mod * h.jockey.skill + pseudoRandom);
                    
                    const prevX = h.x;
                    h.currentSpeed = targetSpeed;
                    h.x += h.currentSpeed;
                    h.yOffset = Math.sin(tick * h.currentSpeed * 0.4) * 5;

                    if (h.x > currentTopX) currentTopX = h.x;

                    if (h.x >= raceLength) {
                        h.hasFinished = true;
                        h.finishTick = tick - 1 + (raceLength - prevX) / h.currentSpeed;
                        h.finishTick += h.randomFactor * 0.01;
                    }

                    const horseEl = document.getElementById(`horse-dom-${h.no}`);
                    if (horseEl) {
                        horseEl.style.left = `${(h.x / 1000) * 85}%`;
                        horseEl.style.top = `calc(${index * 12 + 2}% + ${h.yOffset}px)`;
                        const delayStr = (h.isDelayed && h.x < 100) ? '💦' : '';
                        document.getElementById(`horse-emoji-${h.no}`).innerHTML = `<span class="absolute top-0 right-0 text-xs transform scale-x-100">${delayStr}</span>🏇`;
                        
                        const dustEl = document.getElementById(`horse-dust-${h.no}`);
                        if (h.currentSpeed > 1.5 && !h.hasFinished) {
                            dustEl.style.display = 'block';
                            dustEl.classList.add('dust-anim');
                        } else {
                            dustEl.style.display = 'none';
                        }
                    }
                });

                const progInt = Math.min(100, Math.floor((currentTopX / raceLength) * 100));
                const sortedHorses = [...state.horsesRef].filter(h => !h.isRetired).sort((a, b) => b.x - a.x);
                const topHorse = sortedHorses[0];
                const secondHorse = sortedHorses[1];
                let newMsg = state.message;

                if (accidentMsg) {
                    newMsg = accidentMsg; 
                } else if (topHorse && secondHorse) {
                    if (tick === 1) {
                        newMsg = "ゲートが開いた！ 各馬一斉にスタート！";
                    } else if (progInt >= 15 && state.lastProg < 15) {
                        newMsg = `先頭に立ったのは ${topHorse.no}番 ${topHorse.name}！ 軽快に飛ばします！`;
                    } else if (progInt >= 40 && state.lastProg < 40) {
                        newMsg = `第3コーナーへ向かう！ 依然として ${topHorse.name} がリード！`;
                    } else if (progInt >= 60 && state.lastProg < 60) {
                        newMsg = `第4コーナーカーブ！ 後続も徐々に差を詰めてきたぞ！`;
                    } else if (progInt >= 75 && state.lastProg < 75) {
                        newMsg = `最後の直線に入った！ 先頭は ${topHorse.name}！ ここからスパート！！`;
                    } else if (progInt >= 90 && state.lastProg < 90) {
                        if (topHorse.x - secondHorse.x < 25) {
                            newMsg = `残りわずか！ ${topHorse.name} と ${secondHorse.name} の激しい叩き合いだ！！`;
                        } else {
                            newMsg = `${topHorse.name}、完全に抜け出した！ これは強い！！`;
                        }
                    }
                }

                if (progInt > state.lastProg) {
                    state.lastProg = progInt;
                }
                
                if (newMsg !== state.message) {
                    window.setMessage(`🎙️ ${newMsg}`);
                }

                if (allFinished) {
                    const bg = document.getElementById('race-bg');
                    if(bg) bg.style.animationPlayState = 'paused';
                    window.finishRaceLocal();
                } else {
                    state.animationRef = requestAnimationFrame(animate);
                }
            };
            
            state.animationRef = requestAnimationFrame(animate);
        };

        window.skipRace = () => {
            cancelAnimationFrame(state.animationRef);
            let safetyCounter = 0;
            while(state.horsesRef.some(h => !h.hasFinished && !h.isRetired) && safetyCounter < 1000) {
                state.horsesRef.forEach(h => {
                    if(!h.hasFinished && !h.isRetired) {
                        if (h.isAccident) {
                            h.isRetired = true;
                            h.finishTick = Infinity;
                        } else {
                            const prevX = h.x;
                            const speed = h.speed / 5;
                            h.x += speed;
                            if (h.x >= 1000) {
                                h.hasFinished = true;
                                h.finishTick = safetyCounter - 1 + (1000 - prevX) / speed + (h.randomFactor * 0.01);
                            }
                        }
                    }
                });
                safetyCounter++;
            }
            window.finishRaceLocal();
        };

        window.finishRaceLocal = function() {
            cancelAnimationFrame(state.animationRef);
            
            state.horsesRef.sort((a, b) => {
                if (a.isRetired && !b.isRetired) return 1;
                if (!a.isRetired && b.isRetired) return -1;
                return a.finishTick - b.finishTick;
            });
            
            state.raceResult = state.horsesRef;
            state.phase = 'result'; 

            if (state.mode === 'single' || state.mode === 'hardcore') {
                state.raceResult.forEach((h, idx) => {
                    if (h.isMyHorse && h.originalRef) {
                        h.originalRef.lastRaceResult = h.isRetired ? '中止' : `${idx + 1}着`;
                    }
                });
            } else {
                state.raceResult.forEach((h, idx) => {
                    if (h.isMyHorse && h.ownerSessionId === localSessionId) {
                        const target = state.myHorses.find(myH => myH.name === h.name);
                        if (target) {
                            target.lastRaceResult = h.isRetired ? '中止' : `${idx + 1}着`;
                        }
                    }
                });
            }

            window.render(); 

            window.setMessage("レース終了！払い戻しを計算中...");
            setTimeout(() => {
                window.calculatePayouts();
                if (state.mode === 'multi' && isHost) {
                    const players = { ...roomData.players };
                    Object.keys(players).forEach(sid => players[sid].ready = false);
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', currentRoomId), {
                        phase: 'result',
                        players: players
                    }).catch(e => console.error(e));
                }
            }, 1000);
        };

        window.calculatePayouts = function() {
            let totalPayout = 0;
            let prizeMsg = "";
            const validResult = state.raceResult.filter(h => !h.isRetired);
            const top1 = validResult[0] || state.raceResult[0];
            const top2 = validResult[1] || state.raceResult[1];
            const top3 = validResult[2] || state.raceResult[2];
            const rIds = validResult.map(h => h.no);

            let totalPrize = 0;
            let rankMsgs = [];
            state.raceResult.forEach((h, rank) => {
                if (h.isMyHorse && h.ownerSessionId === localSessionId && !h.isRetired) {
                    let prize = 0;
                    if (rank === 0) prize = 10000;
                    else if (rank === 1) prize = 3000;
                    else if (rank === 2) prize = 1000;
                    
                    if (prize > 0) {
                        totalPrize += prize;
                        rankMsgs.push(`${h.name}が${rank+1}着`);
                    }
                }
            });

            if (totalPrize > 0) {
                totalPayout += totalPrize;
                prizeMsg = ` 愛馬（${rankMsgs.join('、')}）が賞金計 ${totalPrize.toLocaleString()} 円獲得！`;
            }

            state.bets.forEach(bet => {
                let isHit = false;
                let payoutRate = 0;
                const getOdds = (no) => state.horses.find(h => h.no === no)?.odds || 1;

                switch (bet.type) {
                    case '単勝': isHit = bet.horses[0] === top1.no; payoutRate = getOdds(top1.no); break;
                    case '複勝': isHit = rIds.slice(0,3).includes(bet.horses[0]); payoutRate = Math.max(1.1, getOdds(bet.horses[0]) / 3); break;
                    case '枠連':
                    case '馬連': isHit = rIds.slice(0,2).includes(bet.horses[0]) && rIds.slice(0,2).includes(bet.horses[1]); payoutRate = getOdds(top1.no) * getOdds(top2.no) * 0.8; break;
                    case '馬単': isHit = bet.horses[0] === top1.no && bet.horses[1] === top2.no; payoutRate = getOdds(top1.no) * getOdds(top2.no) * 1.5; break;
                    case 'ワイド': isHit = rIds.slice(0,3).includes(bet.horses[0]) && rIds.slice(0,3).includes(bet.horses[1]); payoutRate = getOdds(bet.horses[0]) * getOdds(bet.horses[1]) * 0.3; break;
                    case '3連複': isHit = rIds.slice(0,3).includes(bet.horses[0]) && rIds.slice(0,3).includes(bet.horses[1]) && rIds.slice(0,3).includes(bet.horses[2]); payoutRate = getOdds(top1.no) * getOdds(top2.no) * getOdds(top3.no) * 0.5; break;
                    case '3連単': isHit = bet.horses[0] === top1.no && bet.horses[1] === top2.no && bet.horses[2] === top3.no; payoutRate = getOdds(top1.no) * getOdds(top2.no) * getOdds(top3.no) * 2.0; break;
                }
                
                bet.isHit = isHit;
                if (isHit) {
                    if (state.mode === 'hardcore') {
                        payoutRate = 10000;
                    }
                    totalPayout += Math.floor(bet.amount * payoutRate);
                }
            });

            // ★ハードコアモードの死亡判定
            if (state.mode === 'hardcore' && state.bets.length > 0) {
                const hasHit = state.bets.some(b => b.isHit);
                if (!hasHit) {
                    state.money = 0;
                    state.myHorses = [];
                    state.multiBonusLevel = 1;
                    state.isDead = true;
                    localStorage.setItem('retro_derby_hardcore_dead', 'true');
                    
                    if (state.hardcoreId) {
                        const deadIdsStr = localStorage.getItem('dead_hardcore_ids') || '[]';
                        const deadIds = JSON.parse(deadIdsStr);
                        if (!deadIds.includes(state.hardcoreId)) {
                            deadIds.push(state.hardcoreId);
                            localStorage.setItem('dead_hardcore_ids', JSON.stringify(deadIds));
                        }
                        try {
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_dead_ids', state.hardcoreId), { dead: true, timestamp: Date.now() });
                        } catch(e) {}
                    }

                    window.setMessage(`☠️ ハズレ... 全財産と愛馬を没収されました。`);
                    window.render();
                    
                    setTimeout(() => {
                        window.openModal(`
                            <h3 class="text-2xl text-red-500 font-bold mb-4 text-center">☠️ YOU DIED ☠️</h3>
                            <p class="text-sm text-gray-300 mb-6 text-center">馬券がハズレたため、<br>全財産と愛馬が没収されました。</p>
                            <div class="text-center">
                                <button onclick="executeGoToTitle()" class="bg-gray-800 hover:bg-gray-700 text-white px-8 py-2 rounded border border-gray-600 transition-colors">タイトルへ</button>
                            </div>
                        `);
                    }, 1000);
                    return; 
                }
            }

            // ★寿命システム (生存している場合)
            let retiredHorses = [];
            let survivingHorses = [];
            if (!state.isDead) {
                state.myHorses.forEach(h => {
                    h.lifespan -= 1;
                    if (h.lifespan <= 0) {
                        retiredHorses.push(h.name);
                    } else {
                        survivingHorses.push(h);
                    }
                });
                state.myHorses = survivingHorses;

                if (state.mode === 'multi' && currentRoomId && currentUser) {
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'retro_derby_rooms', currentRoomId), {
                        [`players.${localSessionId}.myHorses`]: state.myHorses
                    }).catch(e => console.error(e));
                }
            }

            // ★結果メッセージ生成
            let finalMsg = "";
            if (totalPayout > 0) {
                finalMsg = `的中！ 払い戻し・賞金合計 ${totalPayout.toLocaleString()} 円 です！${prizeMsg}`;
                window.syncMoney(state.money + totalPayout);
            } else if (state.bets.length > 0) {
                finalMsg = `ハズレ... 次のレースに期待しましょう。${prizeMsg}`;
            } else {
                finalMsg = `馬券を買っていませんでしたね。${prizeMsg}`;
            }

            if (retiredHorses.length > 0 && !state.isDead) {
                finalMsg += ` 【悲報】${retiredHorses.join('、')} が寿命を迎え引退しました...`;
            }

            window.setMessage(finalMsg);
            window.render(); 
        };
