                                <p class="text-[10px] text-white font-bold">${h.name} <span class="text-yellow-400">(${h.type})</span></p>
                                <button onclick="showSellModal(${targetId})" class="bg-red-800 hover:bg-red-700 text-white text-[9px] px-2 py-0.5 rounded border border-red-600 transition-colors">売却</button>
                            </div>
                            <p class="text-[9px] text-amber-500">ｽﾋﾟ:${h.speed} ｽﾀ:${h.stamina} 根性:${h.guts} | 寿命:残り${h.lifespan !== undefined ? h.lifespan : '?'}戦 | 前走:${h.lastRaceResult}</p>
                        </div>
                    `}).join('');
                } else {
                    myHorseList = `<p class="text-[9px] text-gray-400 mb-2">お金を貯めて馬主になりましょう</p>`;
                }

                ownerMenu = `
                    <div class="border-2 border-amber-800 bg-gray-900 p-2 mt-2 shadow-[inset_0_0_10px_rgba(0,0,0,0.8)] flex flex-col max-h-48">
                        <div class="text-amber-300 text-xs mb-2 border-b border-amber-800 pb-1 shrink-0 flex justify-between">
                            <span>■ OWNER MENU</span>
                            <span class="text-yellow-500">${state.myHorses.length} / 6頭</span>
                        </div>
                        <div class="overflow-y-auto hide-scrollbar mb-2 flex-1">
                            ${myHorseList}
                        </div>
                        <button onclick="buyHorse()" class="w-full bg-gradient-to-b from-purple-600 to-purple-900 hover:from-purple-500 hover:to-purple-800 text-white font-bold py-1.5 rounded-sm border border-purple-400 shadow-[0_0_10px_rgba(168,85,247,0.3)] active:transform active:scale-[0.98] transition-all text-xs tracking-wider shrink-0">
                            馬を購入 (${buyCost/10000}万)
                        </button>
                    </div>
                `;
            } else {
                ownerMenu = `
                    <div class="border-2 border-amber-800 bg-gray-900 p-2 mt-2 shadow-[inset_0_0_10px_rgba(0,0,0,0.8)] flex flex-col text-center">
                        <div class="text-amber-300 text-xs mb-1 border-b border-amber-800 pb-1">■ MULTIPLAYER</div>
                        <p class="text-[9px] text-amber-400 mt-1 mb-1">あなたの育成馬がランダムで出走します！</p>
                    </div>
                `;

                if (roomData && roomData.players) {
                    playersStatusHtml = `
                        <div class="border-2 border-amber-800 bg-gray-900 p-2 mt-2 shadow-[inset_0_0_10px_rgba(0,0,0,0.8)] flex flex-col max-h-40">
                            <div class="text-amber-300 text-xs mb-1 border-b border-amber-800 pb-1 shrink-0">■ PLAYERS STATUS</div>
                            <div class="overflow-y-auto hide-scrollbar text-[10px] flex-1">
                                ${Object.values(roomData.players).map(p => `
                                    <div class="flex justify-between items-center mb-1 pb-1 border-b border-gray-800">
                                        <div>
                                            <span class="text-white text-xs font-bold">${p.name}</span>
                                            <span class="text-yellow-400 ml-1">💰${p.money?.toLocaleString() || 0}</span>
                                        </div>
                                        <span class="${p.ready ? 'text-green-400 font-bold' : 'text-gray-500'}">${p.ready ? 'OK' : '予想中'}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            const horseRows = state.horses.map(h => {
                const isSelected = state.selectedHorses.includes(h.no);
                
                const isMyHorse = h.isMyHorse && (state.mode === 'single' || state.mode === 'hardcore' || h.ownerSessionId === localSessionId);
                const isOtherPlayerHorse = h.isMyHorse && state.mode === 'multi' && h.ownerSessionId !== localSessionId;

                let baseClass = isSelected ? 'bg-amber-600 border-amber-300 shadow-[inset_0_0_10px_rgba(0,0,0,0.4)] transform scale-[1.01]' : 'bg-black border-gray-800 hover:bg-gray-800 hover:border-amber-900';
                
                if (isMyHorse && !isSelected) {
                    baseClass = 'bg-blue-900/40 border-blue-800 hover:bg-blue-800/60 hover:border-blue-500';
                } else if (isOtherPlayerHorse && !isSelected) {
                    baseClass = 'bg-purple-900/40 border-purple-800 hover:bg-purple-800/60 hover:border-purple-500';
                }

                const noClass = isSelected ? 'bg-black text-amber-500 border border-amber-500' : `${h.waku.bg} ${h.waku.text} border ${h.waku.border}`;
                
                let rankColor = "text-gray-300";
                if(h.jockey.rank === "S") rankColor = "text-yellow-300 drop-shadow-md";
                if(h.jockey.rank === "A") rankColor = "text-red-300";
                if(h.jockey.rank === "C") rankColor = "text-blue-300";

                return `
                    <div onclick="handleHorseSelect(${h.no})" class="flex items-center p-1.5 md:p-2 cursor-pointer border transition-all ${baseClass}">
                        <div class="w-6 h-6 flex items-center justify-center font-bold text-sm rounded-sm shrink-0 ${noClass}">${h.no}</div>
                        <div class="w-4 text-center font-bold ml-1 shrink-0 ${isSelected ? 'text-black' : 'text-yellow-500 drop-shadow-md'}">${h.mark}</div>
                        <div class="flex-1 ml-2 flex flex-col min-w-0">
                            <div class="font-bold truncate tracking-wide flex items-center gap-1 ${isSelected ? 'text-black' : (isMyHorse ? 'text-blue-300' : (isOtherPlayerHorse ? 'text-purple-300' : 'text-white'))}">
                                ${h.name} 
                                ${isMyHorse ? '<span class="bg-blue-600 text-white text-[9px] px-1 rounded shadow-sm">愛馬</span>' : ''}
                                ${isOtherPlayerHorse ? `<span class="bg-purple-600 text-white text-[9px] px-1 rounded shadow-sm">${h.ownerName}</span>` : ''}
                            </div>
                            <div class="text-[10px] flex gap-2 mt-1 ${isSelected ? 'text-amber-950 font-bold' : 'text-amber-300/80'}">
                                <span class="bg-black/30 px-1 rounded border ${isSelected ? 'border-amber-900/30' : 'border-amber-700/50'}">騎手:<span class="${isSelected ? 'text-black' : rankColor}">${h.jockey.name}[${h.jockey.rank}]</span></span>
                                <span class="bg-black/30 px-1 rounded border ${isSelected ? 'border-amber-900/30' : 'border-amber-700/50'}">前走:${h.lastRace}</span>
                                <span class="bg-black/30 px-1 rounded border ${isSelected ? 'border-amber-900/30' : 'border-amber-700/50'}">馬体:${h.weightStr}</span>
                            </div>
                        </div>
                        <div class="w-8 text-center text-[10px] shrink-0 ${isSelected ? 'text-black font-bold' : 'text-amber-500/60'}">${h.type}</div>
                        <div class="w-12 text-center text-[10px] shrink-0 ${isSelected ? 'text-black font-bold' : h.condition.color}"><span class="hidden md:inline">${h.condition.icon}${h.condition.label}</span><span class="md:hidden">${h.condition.icon}</span></div>
                        <div class="w-12 text-right font-bold tracking-wider shrink-0 ${isSelected ? 'text-black' : 'text-cyan-400'}">${h.odds.toFixed(1)}</div>
                    </div>
                `;
            }).join('');

            const betList = state.bets.length === 0 ? `<p class="text-amber-800/50 text-[10px] text-center mt-4">NO TICKET</p>` : `<ul class="space-y-1">` + state.bets.map((bet, idx) => `
                <li class="flex justify-between items-center text-[10px] bg-gray-900 p-1.5 border border-amber-900/50 hover:border-amber-700 transition-colors">
                    <div class="flex flex-col">
                        <span class="text-yellow-500 font-bold tracking-wide">[${bet.type}]</span>
                        <span class="text-white mt-0.5">${bet.horses.join(' - ')} <span class="text-amber-400 ml-2 font-bold">${bet.amount}円</span></span>
                    </div>
                    <button onclick="removeBet(${idx})" class="text-red-600 hover:text-red-400 text-lg px-2 font-bold">&times;</button>
                </li>
            `).join('') + `</ul>`;
            
            let startButtonHtml = '';
            if (state.mode === 'multi') {
                const myReady = roomData?.players[localSessionId]?.ready || false;
                if (isHost) {
                    const allReady = roomData ? Object.values(roomData.players).every(p => p.ready) : false;
                    
                    if (!myReady) {
                        startButtonHtml = `
                            <button onclick="toggleReady()" class="h-16 bg-gradient-to-b from-blue-600 to-blue-900 hover:from-blue-500 border-blue-400 text-white shadow-[0_0_15px_rgba(37,99,235,0.6)] font-bold text-lg rounded-sm border-2 active:transform active:scale-[0.98] transition-all tracking-widest relative">
                                READY (準備完了)
                            </button>
                            <div class="text-[10px] text-center mt-1 text-gray-400">馬券を買ったら押してください</div>
                        `;
                    } else {
                        startButtonHtml = `
                            <div class="flex flex-col gap-1">
                                <button onclick="toggleReady()" class="h-8 bg-green-700 hover:bg-green-600 border-green-500 text-white font-bold text-xs rounded-sm border-2 transition-all">
                                    準備取消
                                </button>
                                <button onclick="startMultiRun()" ${allReady ? '' : 'disabled'} class="h-12 ${allReady ? 'bg-gradient-to-b from-red-600 to-red-900 shadow-[0_0_10px_rgba(220,38,38,0.6)] hover:from-red-500 hover:to-red-800' : 'bg-gray-700 border-gray-600 text-gray-400 cursor-not-allowed'} font-bold text-xl rounded-sm border-2 border-red-400 active:transform active:scale-[0.98] transition-all tracking-widest relative overflow-hidden group">
                                    RACE START
                                </button>
                                <div class="text-[10px] text-center text-gray-400">全員がOKになると押せます</div>
                            </div>
                        `;
                    }
                } else {
                    startButtonHtml = `
                        <button onclick="toggleReady()" class="h-16 ${myReady ? 'bg-green-700 border-green-500 text-white' : 'bg-gradient-to-b from-blue-600 to-blue-900 hover:from-blue-500 border-blue-400 text-white shadow-[0_0_15px_rgba(37,99,235,0.6)]'} font-bold text-lg rounded-sm border-2 active:transform active:scale-[0.98] transition-all tracking-widest relative">
                            ${myReady ? '待機中... (取消)' : 'READY (準備完了)'}
                        </button>
                    `;
                }
            } else {
                startButtonHtml = `
                    <button onclick="startRace()" class="h-16 bg-gradient-to-b from-red-600 to-red-900 hover:from-red-500 hover:to-red-800 text-white font-bold text-xl rounded-sm border-2 border-red-400 shadow-[0_0_15px_rgba(220,38,38,0.6)] active:transform active:scale-[0.98] transition-all tracking-widest relative overflow-hidden group">
                        <div class="absolute inset-0 bg-white/20 transform -skew-x-12 -translate-x-full group-hover:translate-x-full transition-transform duration-500"></div>
                        RACE START
                    </button>
                `;
            }

            return `
            <div class="flex flex-col md:flex-row gap-2">
                <div class="w-full md:w-1/4 space-y-2 flex flex-col">
                    <div class="border-2 border-amber-800 bg-gray-900 p-2">
                        <div class="text-amber-300 text-xs mb-2 border-b border-amber-800 pb-1">■ SELECT BET TYPE</div>
                        <div class="grid grid-cols-2 gap-1">${betTypeBtns}</div>
                    </div>
                    <div class="border-2 border-amber-800 bg-gray-900 p-2 flex-1 flex flex-col">
                        <div class="text-amber-300 text-xs mb-2 border-b border-amber-800 pb-1">■ INPUT COIN</div>
                        ${amountInputHtml}
                        <div class="text-center mt-auto pt-2 border-t border-amber-800">
                            <div class="text-[10px] text-amber-500/70 mb-1 h-4">選択中: ${state.selectedHorses.join(' - ') || 'なし'}</div>
                            <button onclick="addBet()" class="w-full bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 hover:to-amber-600 text-black font-bold py-2.5 rounded-sm border-b-4 border-amber-900 active:border-b-0 active:mt-1 transition-all shadow-md">ENTRY</button>
                        </div>
                    </div>
                    ${ownerMenu}
                    ${playersStatusHtml}
                </div>
                <div class="w-full md:w-2/4">
                    <div class="border-2 border-amber-800 bg-gray-900 p-2 h-full flex flex-col shadow-[inset_0_0_15px_rgba(0,0,0,0.8)]">
                        <div class="flex justify-between items-end border-b border-amber-800 pb-1 mb-2">
                            <div class="text-amber-300 text-xs">■ RACE CARD</div>
                            <div class="text-[10px] text-amber-400 bg-black px-2 py-0.5 rounded border border-amber-800 shadow-inner">対象券種: <span class="font-bold text-yellow-400">${state.selectedBetType}</span></div>
                        </div>
                        <div class="flex text-[10px] text-amber-600/80 mb-1 px-1">
                            <div class="w-6 text-center">番</div><div class="w-4 text-center">印</div><div class="flex-1 ml-2">馬名</div><div class="w-8 text-center">脚質</div><div class="w-12 text-center">調子</div><div class="w-12 text-right">単オッズ</div>
                        </div>
                        <div class="flex-1 flex flex-col gap-1 hide-scrollbar" style="overflow-y: auto; max-height: 400px;">
                            ${horseRows}
                        </div>
                    </div>
                </div>
                <div class="w-full md:w-1/4 flex flex-col gap-2">
                    <div class="border-2 border-amber-800 bg-gray-900 p-2 flex-1 flex flex-col">
                        <div class="text-amber-300 text-xs mb-2 border-b border-amber-800 pb-1">■ YOUR TICKET</div>
                        <div class="flex-1 overflow-y-auto max-h-40 md:max-h-[300px] bg-black border border-amber-900/50 p-1 shadow-inner hide-scrollbar">${betList}</div>
                        <div class="mt-2 text-right text-xs text-yellow-400 font-bold border-t border-amber-800 pt-2 drop-shadow-sm">TOTAL BET: <span class="text-lg">${state.bets.reduce((sum, b) => sum + b.amount, 0).toLocaleString()}</span> 円</div>
                    </div>
                    ${startButtonHtml}
                </div>
            </div>
            `;
        }

        function getRaceHTML() {
            const horsesDOM = state.horses.map((h, i) => `
                <div id="horse-dom-${h.no}" class="absolute flex items-end transition-transform duration-75 ease-linear" style="top: calc(${i * 12 + 2}%); left: 0%; transform: translateX(-50%);">
                    <div class="w-6 h-6 rounded border ${h.waku.bg} ${h.waku.text} ${h.waku.border} text-xs flex items-center justify-center mb-1 mr-1 font-bold z-20 shadow-md">${h.no}</div>
                    <div id="horse-emoji-${h.no}" class="text-5xl filter drop-shadow-xl z-10 relative transform -scale-x-100"><span class="absolute top-0 right-0 text-xs transform scale-x-100"></span>🏇</div>
                    <div id="horse-dust-${h.no}" class="absolute -left-4 bottom-0 text-2xl opacity-60" style="display:none;">💨</div>
                </div>
            `).join('');
            return `
            <div id="race-container" class="border-2 border-amber-800 bg-[#1a472a] relative overflow-hidden shadow-[inset_0_0_30px_rgba(0,0,0,0.8)]" style="height: 450px;">
                <div class="absolute top-0 left-0 w-full h-full pointer-events-none" style="background-image: repeating-linear-gradient(90deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 50px, transparent 50px, transparent 100px)"></div>
                <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
                    <div class="absolute top-0 h-full border-l-2 border-white/20" style="left: 21.25%"></div><div class="absolute top-0 h-full border-l-2 border-white/20" style="left: 42.5%"></div><div class="absolute top-0 h-full border-l-2 border-white/20" style="left: 63.75%"></div>
                    <div class="absolute top-0 h-full border-l-4 border-red-600 shadow-[0_0_10px_rgba(220,38,38,0.8)]" style="left: 85%"></div>
                </div>
                ${horsesDOM}
                <div class="absolute bottom-3 right-3 z-30">
                    ${(state.mode === 'single' || state.mode === 'hardcore') ? `<button onclick="skipRace()" class="bg-gray-900 text-amber-500 text-xs px-3 py-1.5 rounded-sm border border-amber-700 hover:bg-gray-800 transition-colors shadow-lg">SKIP ⏩</button>` : ''}
                </div>
            </div>
            `;
        }

        function getResultHTML() {
            const resultRows = state.raceResult.map((h, i) => `
                <li class="flex items-center text-lg border-b border-amber-900/50 pb-2">
                    <span class="w-10 text-center font-bold mr-4 ${i === 0 ? 'text-yellow-400 text-2xl drop-shadow-md' : i === 1 ? 'text-gray-300' : i === 2 ? 'text-amber-600' : 'text-amber-800/50'}">${i + 1}着</span>
                    <span class="w-8 h-8 rounded border ${h.waku.bg} ${h.waku.text} ${h.waku.border} flex items-center justify-center mr-4 font-bold shadow-sm">${h.no}</span>
                    <span class="${i === 0 ? 'text-white font-bold' : 'text-gray-300'}">${h.name}</span>
                </li>
            `).join('');

            const betResults = state.bets.length === 0 ? `<p class="text-amber-800/50 text-center mt-4 text-xs">NO ENTRY</p>` : `<ul class="space-y-2">` + state.bets.map((bet) => {
                const isHit = bet.isHit; 
                const hitClass = isHit ? 'bg-amber-900/30 border-yellow-500 shadow-[0_0_5px_rgba(234,179,8,0.5)]' : 'bg-gray-900 border-gray-800';
                const hitText = isHit === undefined ? '判定中...' : (isHit ? '🎯 WIN' : 'LOSE');
                const hitColor = isHit ? 'text-yellow-400 text-lg drop-shadow-sm' : 'text-gray-600 text-xs';
                return `
                    <li class="flex justify-between items-center p-2 border ${hitClass}">
                        <div class="flex flex-col">
                            <span class="text-amber-600/80 text-[10px]">[${bet.type}]</span>
                            <span class="text-white font-bold">${bet.horses.join(' - ')}</span>
                        </div>
                        <span class="font-bold ${hitColor}">${hitText}</span>
                    </li>
                `;
            }).join('') + `</ul>`;

            let nextButtonHtml = '';
            if (state.isDead) {
                nextButtonHtml = `<div class="p-3 border border-red-700 bg-red-950 rounded text-red-400 font-bold text-sm">アカウントBANされました</div>`;
            } else if (state.mode === 'multi') {
                const myReady = roomData?.players[localSessionId]?.ready || false;
                if (isHost) {
                    const allReady = roomData ? Object.values(roomData.players).every(p => p.ready) : false;
                    
                    if (!myReady) {
                        nextButtonHtml = `
                            <button onclick="toggleReady()" class="bg-gradient-to-b from-blue-600 to-blue-900 hover:from-blue-500 border-blue-400 text-white font-bold py-3 px-8 rounded-sm border-2 active:transform active:scale-[0.98] transition-all w-full tracking-widest shadow-md">
                                NEXT RACE (準備完了)
                            </button>
                        `;
                    } else {
                        nextButtonHtml = `
                            <div class="flex flex-col gap-1">
                                <button onclick="toggleReady()" class="h-8 bg-green-700 hover:bg-green-600 border-green-500 text-white font-bold text-xs rounded-sm border-2 transition-all">
                                    準備取消
                                </button>
                                <button onclick="nextMultiRace()" ${allReady ? '' : 'disabled'} class="h-12 ${allReady ? 'bg-gradient-to-b from-red-600 to-red-900 shadow-[0_0_10px_rgba(220,38,38,0.6)] hover:from-red-500 hover:to-red-800' : 'bg-gray-700 border-gray-600 text-gray-400 cursor-not-allowed'} font-bold text-xl rounded-sm border-2 border-red-400 active:transform active:scale-[0.98] transition-all tracking-widest relative overflow-hidden group w-full">
                                    NEXT RACE ▶
                                </button>
                                <div class="text-[10px] text-center text-gray-400">全員がOKになると押せます</div>
                            </div>
                        `;
                    }
                } else {
                    nextButtonHtml = `
                        <button onclick="toggleReady()" class="bg-gradient-to-b from-blue-600 to-blue-900 hover:from-blue-500 border-blue-400 text-white font-bold py-3 px-8 rounded-sm border-2 active:transform active:scale-[0.98] transition-all w-full tracking-widest shadow-md ${myReady ? 'bg-green-700 border-green-500' : ''}">
                            ${myReady ? '待機中... (取消)' : 'NEXT RACE (準備完了)'}
                        </button>
                    `;
                }
            } else {
                nextButtonHtml = `
                    <button onclick="nextRace()" class="bg-gradient-to-b from-blue-600 to-blue-900 hover:from-blue-500 hover:to-blue-800 text-white font-bold py-3 px-8 rounded-sm border-b-4 border-blue-950 active:border-b-0 active:mt-1 w-full tracking-widest shadow-md">
                        NEXT RACE ▶
                    </button>
                `;
            }

            return `
            <div class="space-y-2">
                <div class="bg-amber-600 text-black font-bold px-3 py-1 inline-block mb-2 shadow-[0_0_5px_rgba(217,119,6,0.8)]">🏆 RACE RESULT</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="border-2 border-amber-800 p-4 bg-gray-900 shadow-inner">
                        <ul class="space-y-3">${resultRows}</ul>
                    </div>
                    <div class="border-2 border-amber-800 p-4 flex flex-col bg-gray-900 shadow-inner">
                        <h3 class="text-amber-300 text-sm mb-2 border-b border-amber-800 pb-1">■ YOUR TICKET</h3>
                        <div class="flex-1 overflow-y-auto max-h-64 bg-black border border-amber-900/50 p-2 hide-scrollbar">${betResults}</div>
                        <div class="mt-4 text-center">
                            ${nextButtonHtml}
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        // --- ゲーム開始 ---
        window.onload = () => {
            window.render(); 
        };

    </script>
</body>
</html>
